<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Таро</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', Georgia, serif;
            background: #0a0a0a;
            min-height: 100vh;
            padding: 20px;
            color: #e8e8e8;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 28px;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #ffffff;
        }

        .subtitle {
            text-align: center;
            opacity: 0.6;
            margin-bottom: 30px;
            font-size: 14px;
            letter-spacing: 1px;
            font-weight: 400;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 25px;
            perspective: 1000px;
        }

        .card {
            aspect-ratio: 2/3;
            cursor: pointer;
            position: relative;
            transition: transform 0.3s ease;
        }

        .card:hover:not(.disabled) {
            transform: translateY(-8px);
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.7s ease;
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 8px;
        }

        .card-back {
            background: linear-gradient(145deg, #1a1a1a 0%, #0d0d0d 100%);
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-back-pattern {
            width: 70%;
            height: 70%;
            border: 1px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-back-inner {
            width: 80%;
            height: 80%;
            border: 1px solid #333;
        }

        .card-front {
            background: linear-gradient(145deg, #151515 0%, #0a0a0a 100%);
            border: 1px solid #555;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px;
        }

        .card-symbol {
            font-size: 28px;
            margin-bottom: 8px;
            color: #888;
            font-weight: 300;
        }

        .card-name {
            font-size: 9px;
            font-weight: 500;
            text-align: center;
            color: #aaa;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .card.selected .card-front {
            border-color: #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
        }

        .card.selected .card-symbol,
        .card.selected .card-name {
            color: #fff;
        }

        .card.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        .selected-count {
            text-align: center;
            font-size: 16px;
            padding: 15px;
            background: #111;
            border: 1px solid #222;
            border-radius: 8px;
            font-weight: 400;
            letter-spacing: 2px;
        }

        .count-number {
            font-size: 24px;
            font-weight: 600;
            color: #fff;
        }

        .sending-message {
            text-align: center;
            margin-top: 20px;
            opacity: 0;
            transition: opacity 0.3s;
            color: #fff;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .sending-message.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Таро</h1>
        <p class="subtitle">Выбери четыре карты</p>
        
        <div class="cards-container" id="cardsContainer"></div>
        
        <div class="selected-count">
            <span class="count-number" id="selectedCount">0</span> / 4
        </div>

        <div class="sending-message" id="sendingMessage">Отправляю...</div>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.enableClosingConfirmation();

        const TOTAL_CARDS = 72;
        const CARDS_TO_SHOW = 8;
        const CARDS_TO_SELECT = 4;

        let selectedCards = [];
        let flippedCards = new Set();

        const CARD_NAMES = {
            1: "Шут", 2: "Маг", 3: "Жрица", 4: "Императрица", 5: "Император",
            6: "Иерофант", 7: "Влюбленные", 8: "Колесница", 9: "Сила", 10: "Отшельник",
            11: "Фортуна", 12: "Справедливость", 13: "Повешенный", 14: "Смерть",
            15: "Умеренность", 16: "Дьявол", 17: "Башня", 18: "Звезда", 19: "Луна", 20: "Солнце",
            21: "Суд", 22: "Мир",
            23: "Туз Жезлов", 24: "II Жезлов", 25: "III Жезлов", 26: "IV Жезлов",
            27: "V Жезлов", 28: "VI Жезлов", 29: "VII Жезлов", 30: "VIII Жезлов",
            31: "IX Жезлов", 32: "X Жезлов", 33: "Паж Жезлов", 34: "Рыцарь Жезлов",
            35: "Королева Жезлов", 36: "Король Жезлов",
            37: "Туз Кубков", 38: "II Кубков", 39: "III Кубков", 40: "IV Кубков",
            41: "V Кубков", 42: "VI Кубков", 43: "VII Кубков", 44: "VIII Кубков",
            45: "IX Кубков", 46: "X Кубков", 47: "Паж Кубков", 48: "Рыцарь Кубков",
            49: "Королева Кубков", 50: "Король Кубков",
            51: "Туз Мечей", 52: "II Мечей", 53: "III Мечей", 54: "IV Мечей",
            55: "V Мечей", 56: "VI Мечей", 57: "VII Мечей", 58: "VIII Мечей",
            59: "IX Мечей", 60: "X Мечей", 61: "Паж Мечей", 62: "Рыцарь Мечей",
            63: "Королева Мечей", 64: "Король Мечей",
            65: "Туз Пентаклей", 66: "II Пентаклей", 67: "III Пентаклей", 68: "IV Пентаклей",
            69: "V Пентаклей", 70: "VI Пентаклей", 71: "VII Пентаклей", 72: "VIII Пентаклей"
        };

        function getCardSymbol(cardId) {
            if (cardId <= 22) return String(cardId).padStart(2, '0');
            if (cardId <= 36) return "W";
            if (cardId <= 50) return "C";
            if (cardId <= 64) return "S";
            return "P";
        }

        function generateRandomCards() {
            const allCards = Array.from({length: TOTAL_CARDS}, (_, i) => i + 1);
            for (let i = allCards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [allCards[i], allCards[j]] = [allCards[j], allCards[i]];
            }
            return allCards.slice(0, CARDS_TO_SHOW);
        }

        function initCards() {
            const availableCards = generateRandomCards();
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';
            
            availableCards.forEach((cardId) => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card';
                cardDiv.dataset.cardId = cardId;
                
                cardDiv.innerHTML = `
                    <div class="card-inner">
                        <div class="card-face card-back">
                            <div class="card-back-pattern">
                                <div class="card-back-inner"></div>
                            </div>
                        </div>
                        <div class="card-face card-front">
                            <div class="card-symbol">${getCardSymbol(cardId)}</div>
                            <div class="card-name">${CARD_NAMES[cardId]}</div>
                        </div>
                    </div>
                `;
                
                cardDiv.addEventListener('click', () => handleCardClick(cardDiv, cardId));
                container.appendChild(cardDiv);
            });
        }

        function handleCardClick(cardElement, cardId) {
            if (cardElement.classList.contains('disabled')) return;
            
            if (!flippedCards.has(cardId)) {
                // Переворачиваем карту
                cardElement.classList.add('flipped');
                flippedCards.add(cardId);
                
                setTimeout(() => {
                    if (selectedCards.length < CARDS_TO_SELECT) {
                        cardElement.classList.add('selected');
                        selectedCards.push(cardId);
                        updateUI();
                        
                        // Если выбрано 4 карты - отправляем и закрываем
                        if (selectedCards.length === CARDS_TO_SELECT) {
                            setTimeout(() => {
                                sendDataAndClose();
                            }, 300);
                        }
                    }
                }, 400);
            } else if (cardElement.classList.contains('selected')) {
                // Отменить выбор
                cardElement.classList.remove('selected');
                selectedCards = selectedCards.filter(id => id !== cardId);
                updateUI();
            }
        }

        function updateUI() {
            document.getElementById('selectedCount').textContent = selectedCards.length;
            
            document.querySelectorAll('.card').forEach(card => {
                const cardId = parseInt(card.dataset.cardId);
                if (selectedCards.length >= CARDS_TO_SELECT && !selectedCards.includes(cardId)) {
                    card.classList.add('disabled');
                } else if (!selectedCards.includes(cardId)) {
                    card.classList.remove('disabled');
                }
            });
        }

        function sendDataAndClose() {
            if (selectedCards.length !== CARDS_TO_SELECT) return;
            
            try {
                // Показываем сообщение
                document.getElementById('sendingMessage').classList.add('show');
                
                // Формируем данные
                const data = JSON.stringify({
                    selected_cards: selectedCards
                });
                
                console.log('Sending data:', data);
                
                // Отправляем данные
                tg.sendData(data);
                
                // Закрываем окно
                setTimeout(() => {
                    tg.close();
                }, 500);
                
            } catch (error) {
                console.error('Error:', error);
                tg.showAlert('Ошибка отправки: ' + error.message);
            }
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            initCards();
            console.log('Telegram WebApp initialized');
        });
    </script>
</body>
</html>
