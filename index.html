<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Расклад Таро</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
            overflow-x: hidden;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            text-align: center;
            opacity: 0.9;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
            perspective: 1000px;
        }

        .card {
            aspect-ratio: 2/3;
            cursor: pointer;
            position: relative;
            transition: transform 0.3s ease;
        }

        .card:hover:not(.disabled) {
            transform: translateY(-5px);
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .card-back {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 2px solid #d4af37;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }

        .card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: 3px solid #d4af37;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .card-front img {
            max-width: 100%;
            max-height: 70%;
            object-fit: contain;
            border-radius: 8px;
        }

        .card-name {
            margin-top: 8px;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .card.selected .card-front {
            border-color: #4CAF50;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.6);
        }

        .card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .selected-count {
            text-align: center;
            font-size: 18px;
            margin-bottom: 20px;
            padding: 12px;
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            font-weight: 600;
        }

        .question-block {
            margin-bottom: 20px;
        }

        .question-block label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 16px;
        }

        #question {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.15);
            color: #fff;
            font-size: 16px;
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }

        #question::placeholder {
            color: rgba(255,255,255,0.6);
        }

        #question:focus {
            outline: none;
            border-color: rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.2);
        }

        #submitBtn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #submitBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }

        #submitBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #666;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔮 Выбери 4 карты</h1>
        <p class="subtitle">Нажми на карту, чтобы перевернуть её</p>
        
        <div class="cards-container" id="cardsContainer"></div>
        
        <div class="selected-count">
            Выбрано: <span id="selectedCount">0</span>/4
        </div>
        
        <div class="question-block">
            <label for="question">Твой вопрос:</label>
            <textarea id="question" placeholder="Например: Что мне нужно понять о текущей ситуации?"></textarea>
        </div>
        
        <button id="submitBtn" disabled>Получить расклад</button>
    </div>
    
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const TOTAL_CARDS = 72;
        const CARDS_TO_SHOW = 6;
        const CARDS_TO_SELECT = 4;

        let selectedCards = [];
        let availableCards = [];
        let flippedCards = new Set();

        // Названия карт
        const CARD_NAMES = {
            1: "Шут", 2: "Маг", 3: "Верховная Жрица", 4: "Императрица", 5: "Император",
            6: "Иерофант", 7: "Влюбленные", 8: "Колесница", 9: "Сила", 10: "Отшельник",
            11: "Колесо Фортуны", 12: "Справедливость", 13: "Повешенный", 14: "Смерть",
            15: "Умеренность", 16: "Дьявол", 17: "Башня", 18: "Звезда", 19: "Луна", 20: "Солнце",
            21: "Суд", 22: "Мир",
            23: "Туз Жезлов", 24: "Двойка Жезлов", 25: "Тройка Жезлов", 26: "Четверка Жезлов",
            27: "Пятерка Жезлов", 28: "Шестерка Жезлов", 29: "Семерка Жезлов", 30: "Восьмерка Жезлов",
            31: "Девятка Жезлов", 32: "Десятка Жезлов", 33: "Паж Жезлов", 34: "Рыцарь Жезлов",
            35: "Королева Жезлов", 36: "Король Жезлов",
            37: "Туз Кубков", 38: "Двойка Кубков", 39: "Тройка Кубков", 40: "Четверка Кубков",
            41: "Пятерка Кубков", 42: "Шестерка Кубков", 43: "Семерка Кубков", 44: "Восьмерка Кубков",
            45: "Девятка Кубков", 46: "Десятка Кубков", 47: "Паж Кубков", 48: "Рыцарь Кубков",
            49: "Королева Кубков", 50: "Король Кубков",
            51: "Туз Мечей", 52: "Двойка Мечей", 53: "Тройка Мечей", 54: "Четверка Мечей",
            55: "Пятерка Мечей", 56: "Шестерка Мечей", 57: "Семерка Мечей", 58: "Восьмерка Мечей",
            59: "Девятка Мечей", 60: "Десятка Мечей", 61: "Паж Мечей", 62: "Рыцарь Мечей",
            63: "Королева Мечей", 64: "Король Мечей",
            65: "Туз Пентаклей", 66: "Двойка Пентаклей", 67: "Тройка Пентаклей", 68: "Четверка Пентаклей",
            69: "Пятерка Пентаклей", 70: "Шестерка Пентаклей", 71: "Семерка Пентаклей", 72: "Восьмерка Пентаклей"
        };

        // Генерация изображения карты (временно эмодзи, можно заменить на реальные изображения)
        function getCardImage(cardId) {
            // Если у тебя есть реальные изображения, замени на:
            // return `cards/card_${cardId}.jpg`;
            
            // Временно используем эмодзи
            const suits = {
                1: "🃏", // Старшие арканы
                23: "🔥", // Жезлы
                37: "💧", // Кубки
                51: "⚔️", // Мечи
                65: "💰"  // Пентакли
            };
            
            let emoji = "🎴";
            if (cardId <= 22) emoji = suits[1];
            else if (cardId <= 36) emoji = suits[23];
            else if (cardId <= 50) emoji = suits[37];
            else if (cardId <= 64) emoji = suits[51];
            else emoji = suits[65];
            
            return `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='300'><rect width='200' height='300' fill='%23fff'/><text x='50%' y='50%' font-size='80' text-anchor='middle' dominant-baseline='middle'>${emoji}</text></svg>`;
        }

        function generateRandomCards() {
            const allCards = Array.from({length: TOTAL_CARDS}, (_, i) => i + 1);
            const shuffled = allCards.sort(() => Math.random() - 0.5);
            return shuffled.slice(0, CARDS_TO_SHOW);
        }

        function initCards() {
            availableCards = generateRandomCards();
            const container = document.getElementById('cardsContainer');
            
            availableCards.forEach((cardId) => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card';
                cardDiv.dataset.cardId = cardId;
                
                cardDiv.innerHTML = `
                    <div class="card-inner">
                        <div class="card-face card-back">🔮</div>
                        <div class="card-face card-front">
                            <img src="${getCardImage(cardId)}" alt="${CARD_NAMES[cardId]}">
                            <div class="card-name">${CARD_NAMES[cardId]}</div>
                        </div>
                    </div>
                `;
                
                cardDiv.addEventListener('click', () => handleCardClick(cardDiv, cardId));
                
                container.appendChild(cardDiv);
            });
        }

        function handleCardClick(cardElement, cardId) {
            if (cardElement.classList.contains('disabled')) return;
            
            // Сначала переворачиваем карту
            if (!flippedCards.has(cardId)) {
                cardElement.classList.add('flipped');
                flippedCards.add(cardId);
                
                // Даем время на анимацию переворота
                setTimeout(() => {
                    toggleSelection(cardElement, cardId);
                }, 300);
            } else {
                toggleSelection(cardElement, cardId);
            }
        }

        function toggleSelection(cardElement, cardId) {
            if (cardElement.classList.contains('selected')) {
                // Отменить выбор
                cardElement.classList.remove('selected');
                selectedCards = selectedCards.filter(id => id !== cardId);
            } else {
                // Выбрать карту
                if (selectedCards.length < CARDS_TO_SELECT) {
                    cardElement.classList.add('selected');
                    selectedCards.push(cardId);
                } else {
                    return;
                }
            }
            
            updateUI();
        }

        function updateUI() {
            document.getElementById('selectedCount').textContent = selectedCards.length;
            
            const submitBtn = document.getElementById('submitBtn');
            const questionInput = document.getElementById('question');
            
            if (selectedCards.length === CARDS_TO_SELECT && questionInput.value.trim()) {
                submitBtn.disabled = false;
            } else {
                submitBtn.disabled = true;
            }
            
            // Блокируем неперевернутые карты если уже выбрано 4
            document.querySelectorAll('.card').forEach(card => {
                const cardId = parseInt(card.dataset.cardId);
                if (selectedCards.length === CARDS_TO_SELECT && 
                    !selectedCards.includes(cardId)) {
                    card.classList.add('disabled');
                } else {
                    card.classList.remove('disabled');
                }
            });
        }

        function sendData() {
            const question = document.getElementById('question').value.trim();
            
            if (selectedCards.length !== CARDS_TO_SELECT || !question) {
                tg.showAlert('Выбери 4 карты и задай вопрос!');
                return;
            }
            
            const data = {
                selected_cards: selectedCards,
                question: question
            };
            
            tg.sendData(JSON.stringify(data));
        }

        document.addEventListener('DOMContentLoaded', () => {
            initCards();
            
            document.getElementById('question').addEventListener('input', updateUI);
            document.getElementById('submitBtn').addEventListener('click', sendData);
            
            tg.MainButton.text = 'Получить расклад';
            tg.MainButton.onClick(sendData);
        });
    </script>
</body>
</html>
