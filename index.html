<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Расклад Таро</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
            color: #fff;
            overflow-x: hidden;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            text-align: center;
            opacity: 0.9;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
            perspective: 1000px;
        }

        .card {
            aspect-ratio: 2/3;
            cursor: pointer;
            position: relative;
            transition: transform 0.3s ease;
        }

        .card:hover:not(.disabled) {
            transform: translateY(-5px);
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .card-back {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 2px solid #d4af37;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .card-front {
            background: linear-gradient(135deg, #2d1f3d 0%, #1a1a2e 100%);
            border: 3px solid #d4af37;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5px;
        }

        .card-emoji {
            font-size: 36px;
            margin-bottom: 5px;
        }

        .card-name {
            font-size: 9px;
            font-weight: 600;
            text-align: center;
            color: #d4af37;
        }

        .card.selected .card-front {
            border-color: #4CAF50;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.8);
        }

        .card.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        .selected-count {
            text-align: center;
            font-size: 18px;
            margin-bottom: 15px;
            padding: 12px;
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            font-weight: 600;
        }

        #submitBtn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #submitBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }

        #submitBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔮 Выбери 4 карты</h1>
        <p class="subtitle">Нажми на карту, чтобы перевернуть</p>
        
        <div class="cards-container" id="cardsContainer"></div>
        
        <div class="selected-count">
            Выбрано: <span id="selectedCount">0</span> / 4
        </div>
        
        <button id="submitBtn" disabled>✨ Получить расклад</button>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const TOTAL_CARDS = 72;
        const CARDS_TO_SHOW = 8;
        const CARDS_TO_SELECT = 4;

        let selectedCards = [];
        let flippedCards = new Set();

        const CARD_NAMES = {
            1: "Шут", 2: "Маг", 3: "Верховная Жрица", 4: "Императрица", 5: "Император",
            6: "Иерофант", 7: "Влюбленные", 8: "Колесница", 9: "Сила", 10: "Отшельник",
            11: "Колесо Фортуны", 12: "Справедливость", 13: "Повешенный", 14: "Смерть",
            15: "Умеренность", 16: "Дьявол", 17: "Башня", 18: "Звезда", 19: "Луна", 20: "Солнце",
            21: "Суд", 22: "Мир",
            23: "Туз Жезлов", 24: "2 Жезлов", 25: "3 Жезлов", 26: "4 Жезлов",
            27: "5 Жезлов", 28: "6 Жезлов", 29: "7 Жезлов", 30: "8 Жезлов",
            31: "9 Жезлов", 32: "10 Жезлов", 33: "Паж Жезлов", 34: "Рыцарь Жезлов",
            35: "Королева Жезлов", 36: "Король Жезлов",
            37: "Туз Кубков", 38: "2 Кубков", 39: "3 Кубков", 40: "4 Кубков",
            41: "5 Кубков", 42: "6 Кубков", 43: "7 Кубков", 44: "8 Кубков",
            45: "9 Кубков", 46: "10 Кубков", 47: "Паж Кубков", 48: "Рыцарь Кубков",
            49: "Королева Кубков", 50: "Король Кубков",
            51: "Туз Мечей", 52: "2 Мечей", 53: "3 Мечей", 54: "4 Мечей",
            55: "5 Мечей", 56: "6 Мечей", 57: "7 Мечей", 58: "8 Мечей",
            59: "9 Мечей", 60: "10 Мечей", 61: "Паж Мечей", 62: "Рыцарь Мечей",
            63: "Королева Мечей", 64: "Король Мечей",
            65: "Туз Пентаклей", 66: "2 Пентаклей", 67: "3 Пентаклей", 68: "4 Пентаклей",
            69: "5 Пентаклей", 70: "6 Пентаклей", 71: "7 Пентаклей", 72: "8 Пентаклей"
        };

        function getCardEmoji(cardId) {
            if (cardId <= 22) return "🃏";
            if (cardId <= 36) return "🔥";
            if (cardId <= 50) return "💧";
            if (cardId <= 64) return "⚔️";
            return "💰";
        }

        function generateRandomCards() {
            const allCards = Array.from({length: TOTAL_CARDS}, (_, i) => i + 1);
            for (let i = allCards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [allCards[i], allCards[j]] = [allCards[j], allCards[i]];
            }
            return allCards.slice(0, CARDS_TO_SHOW);
        }

        function initCards() {
            const availableCards = generateRandomCards();
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';
            
            availableCards.forEach((cardId) => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card';
                cardDiv.dataset.cardId = cardId;
                
                cardDiv.innerHTML = `
                    <div class="card-inner">
                        <div class="card-face card-back">🔮</div>
                        <div class="card-face card-front">
                            <div class="card-emoji">${getCardEmoji(cardId)}</div>
                            <div class="card-name">${CARD_NAMES[cardId]}</div>
                        </div>
                    </div>
                `;
                
                cardDiv.addEventListener('click', () => handleCardClick(cardDiv, cardId));
                container.appendChild(cardDiv);
            });
        }

        function handleCardClick(cardElement, cardId) {
            if (cardElement.classList.contains('disabled')) return;
            
            if (!flippedCards.has(cardId)) {
                // Переворачиваем карту
                cardElement.classList.add('flipped');
                flippedCards.add(cardId);
                
                // Автоматически выбираем после переворота
                setTimeout(() => {
                    if (selectedCards.length < CARDS_TO_SELECT) {
                        cardElement.classList.add('selected');
                        selectedCards.push(cardId);
                        updateUI();
                    }
                }, 400);
            } else if (cardElement.classList.contains('selected')) {
                // Отменить выбор
                cardElement.classList.remove('selected');
                selectedCards = selectedCards.filter(id => id !== cardId);
                updateUI();
            }
        }

        function updateUI() {
            document.getElementById('selectedCount').textContent = selectedCards.length;
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = selectedCards.length !== CARDS_TO_SELECT;
            
            // Блокируем оставшиеся карты если выбрано 4
            document.querySelectorAll('.card').forEach(card => {
                const cardId = parseInt(card.dataset.cardId);
                if (selectedCards.length >= CARDS_TO_SELECT && !selectedCards.includes(cardId)) {
                    card.classList.add('disabled');
                } else if (!selectedCards.includes(cardId)) {
                    card.classList.remove('disabled');
                }
            });

            // Показываем/скрываем главную кнопку Telegram
            if (selectedCards.length === CARDS_TO_SELECT) {
                tg.MainButton.setText('✨ Получить расклад');
                tg.MainButton.show();
            } else {
                tg.MainButton.hide();
            }
        }

        function sendData() {
            if (selectedCards.length !== CARDS_TO_SELECT) {
                tg.showAlert('Выбери ровно 4 карты!');
                return;
            }
            
            const data = JSON.stringify({
                selected_cards: selectedCards
            });
            
            console.log('Sending data:', data);
            tg.sendData(data);
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            initCards();
            
            document.getElementById('submitBtn').addEventListener('click', sendData);
            
            tg.MainButton.onClick(sendData);
            tg.MainButton.hide();
        });
    </script>
</body>
</html>
